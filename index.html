<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>My Boys 💜</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&display=swap');
:root{--bg:#09090f;--surface:#111119;--card:#18182a;--border:#252540;--a1:#7c5cbf;--a2:#c45c8a;--a3:#5cb8bf;--gold:#e8c96a;--text:#f0eeff;--text2:#8888bb;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;}

/* PARTICLES */
#ptc{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.pt{position:absolute;border-radius:50%;animation:floatUp linear infinite;opacity:0;}
@keyframes floatUp{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:.5}90%{opacity:.2}100%{transform:translateY(-5vh) scale(1.2);opacity:0}}

/* HEADER */
header{position:relative;z-index:10;text-align:center;padding:10px 16px 4px;flex-shrink:0;}
.ttl{font-family:'Bebas Neue',sans-serif;font-size:clamp(30px,10vw,52px);letter-spacing:6px;
  background:linear-gradient(135deg,var(--a1),var(--a2),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:tp 3s ease-in-out infinite;}
@keyframes tp{0%,100%{filter:drop-shadow(0 0 14px rgba(124,92,191,.5))}50%{filter:drop-shadow(0 0 28px rgba(196,92,138,.5))}}
.sub{font-size:11px;color:var(--text2);letter-spacing:3px;margin-top:2px;}

/* TAB BAR */
.tabs{display:flex;gap:8px;padding:8px 16px;position:relative;z-index:10;flex-shrink:0;}
.tab{flex:1;padding:10px 6px;border-radius:14px;border:1.5px solid var(--border);
  background:var(--surface);color:var(--text2);font-size:13px;font-weight:700;
  cursor:pointer;transition:all .25s;font-family:'Noto Sans KR',sans-serif;text-align:center;}
.tab:active{transform:scale(.96);}
.tab.active{border-color:transparent;color:#fff;box-shadow:0 4px 18px rgba(124,92,191,.4);}
.tab-hello.active{background:linear-gradient(135deg,#5c8abf,#3a5a9f);}
.tab-chat.active{background:linear-gradient(135deg,#7c5cbf,#5c3a9f);}
.tab-funny.active{background:linear-gradient(135deg,#c45c8a,#a03468);}

/* STAGE */
.stage-wrap{display:flex;justify-content:center;align-items:center;padding:2px 0;position:relative;z-index:10;flex-shrink:0;}
.stage{width:100px;height:100px;display:flex;align-items:center;justify-content:center;position:relative;}
.stage-emoji{width:80px;height:80px;display:block;animation:idle 3.5s ease-in-out infinite;transform-origin:bottom center;filter:drop-shadow(0 8px 18px rgba(124,92,191,.5));object-fit:cover;border-radius:50%;border:2px solid var(--a1);}
@keyframes idle{0%,100%{transform:translateY(0) rotate(0)}30%{transform:translateY(-8px) rotate(-2deg)}70%{transform:translateY(-4px) rotate(2deg)}}
.stage.anim-hello .stage-emoji{animation:sHello .5s ease-in-out 5!important;}
.stage.anim-chat .stage-emoji{animation:sChat .5s ease-in-out 6!important;}
.stage.anim-funny .stage-emoji{animation:sFunny .35s ease-in-out 8!important;}
.stage.anim-surprise .stage-emoji{animation:sSurp .6s ease-in-out 5!important;}
@keyframes sHello{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-14px) rotate(-5deg)}}
@keyframes sChat{0%,100%{transform:scale(1)}40%{transform:scale(1.2) translateY(-8px)}70%{transform:scale(.95)}}
@keyframes sFunny{0%,100%{transform:rotate(0)}25%{transform:rotate(-18deg) scale(1.1)}75%{transform:rotate(18deg) scale(1.1)}}
@keyframes sSurp{0%{transform:scale(1)}25%{transform:scale(.7) rotate(-8deg)}65%{transform:scale(1.3) rotate(5deg)}100%{transform:scale(1)}}

/* CHAR GRID */
.char-scroll{padding:4px 12px;position:relative;z-index:10;flex-shrink:0;}
.char-row{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.char-card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;
  padding:8px 4px;text-align:center;cursor:pointer;transition:all .28s cubic-bezier(.34,1.56,.64,1);
  width:100%;box-sizing:border-box;position:relative;overflow:hidden;}
.char-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--a1),var(--a2));opacity:0;transition:opacity .3s;}
.char-card:active{transform:scale(.93);}
.char-card.active{border-color:var(--a1);transform:translateY(-4px) scale(1.05);box-shadow:0 8px 22px rgba(124,92,191,.45);}
.char-card.active::before{opacity:.18;}
.ce{width:46px;height:46px;display:block;position:relative;z-index:1;margin-bottom:3px;object-fit:cover;border-radius:10px;margin:0 auto 3px;}
.cn{font-size:9px;font-weight:700;position:relative;z-index:1;line-height:1.3;color:var(--text);
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;word-break:keep-all;}
.cc{font-size:8px;color:var(--text2);margin-top:2px;position:relative;z-index:1;}
.char-card.active .ce{animation:cPop .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes cPop{0%{transform:scale(1)}40%{transform:scale(1.25) rotate(-6deg)}100%{transform:scale(1)}}

/* DIALOGUE */
.dlg-wrap{flex:1;overflow:hidden;padding:8px 14px;display:flex;flex-direction:column;position:relative;z-index:10;}
.dlg-box{background:var(--card);border:1.5px solid var(--border);border-radius:20px;
  padding:16px 18px;flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;
  position:relative;overflow-y:auto;transition:border-color .3s,box-shadow .3s;}
.dlg-box.c-hello  {border-color:#5c8abf;box-shadow:0 0 24px rgba(92,138,191,.2);}
.dlg-box.c-chat   {border-color:var(--a1);box-shadow:0 0 24px rgba(124,92,191,.2);}
.dlg-box.c-funny  {border-color:var(--a2);box-shadow:0 0 24px rgba(196,92,138,.2);}
.dlg-box.c-surprise{border-color:var(--gold);box-shadow:0 0 24px rgba(232,201,106,.2);}
.dlg-who{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}
.dlg-txt{font-size:clamp(14px,3.8vw,18px);font-weight:500;line-height:1.8;text-align:center;min-height:50px;width:100%;display:block;word-break:keep-all;overflow-wrap:anywhere;white-space:normal;padding:0 2px;}
.dlg-badge{margin-top:14px;padding:3px 12px;border-radius:16px;font-size:10px;font-weight:700;letter-spacing:2px;}
.bd-hello  {background:rgba(92,138,191,.2);color:#7aafdf;}
.bd-chat   {background:rgba(124,92,191,.2);color:#a07fe8;}
.bd-funny  {background:rgba(196,92,138,.2);color:#e07aaa;}
.bd-surprise{background:rgba(232,201,106,.2);color:var(--gold);}
.tc{display:inline;opacity:0;animation:fadeC .04s forwards;white-space:pre;}
@keyframes fadeC{to{opacity:1}}
.dots{display:flex;gap:6px;align-items:center;justify-content:center;padding:14px;}
.dots span{width:9px;height:9px;border-radius:50%;background:var(--a1);animation:db 1.1s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:.18s;background:var(--a2);}
.dots span:nth-child(3){animation-delay:.36s;background:var(--gold);}
@keyframes db{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1.2);opacity:1}}

/* HISTORY */
.hist-wrap{padding:4px 14px 10px;position:relative;z-index:10;flex-shrink:0;max-height:100px;overflow-y:auto;}
.hist-wrap::-webkit-scrollbar{width:2px;}
.hist-wrap::-webkit-scrollbar-thumb{background:var(--border);}
.hist-lbl{font-size:9px;color:var(--text2);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;}
.hist-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:6px 10px;font-size:11px;color:var(--text2);display:flex;gap:7px;align-items:flex-start;margin-bottom:4px;}
.hi-who{font-weight:700;white-space:nowrap;font-size:10px;}
.hi-bdg{font-size:8px;padding:1px 6px;border-radius:8px;white-space:nowrap;flex-shrink:0;}

/* SPARKLE */
.sparkle{position:fixed;pointer-events:none;animation:sp .75s ease-out forwards;z-index:9999;}
@keyframes sp{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}
</style>
</head>
<body>
<div id="ptc"></div>
<header>
  <div class="ttl">My Boys</div>
  <div class="sub">HJ의 남자친구들 💜</div>
</header>
<div class="char-scroll"><div class="char-row" id="charRow"></div></div>
<div class="stage-wrap"><div class="stage" id="stage"><img class="stage-emoji" id="stageE" src="" alt="💜" style="width:80px;height:80px;object-fit:cover;border-radius:50%;display:none;" onload="this.style.display='block';document.getElementById('stageHeart').style.display='none'"><span id="stageHeart" style="font-size:56px;display:block;animation:idle 3.5s ease-in-out infinite;transform-origin:bottom center;filter:drop-shadow(0 8px 18px rgba(124,92,191,.5));">💜</span></div></div>
<div class="tabs">
  <button class="tab tab-hello active" onclick="setTab('hello')">👋 안녕</button>
  <button class="tab tab-chat"  onclick="setTab('chat')">💬 잡담</button>
  <button class="tab tab-funny" onclick="setTab('funny')">😂 웃겨봐</button>
</div>
<div class="dlg-wrap">
  <div class="dlg-box" id="dlgBox">
    <div class="dlg-who" id="dlgWho" style="color:var(--a1)">캐릭터를 선택해줘 💜</div>
    <div class="dlg-txt"  id="dlgTxt">네 남자친구를 골라봐!</div>
  </div>
</div>
<div class="hist-wrap">
  <div class="hist-lbl">최근 기록</div>
  <div id="histList"></div>
</div>

let sel=null, curTab='hello', hist=[], btnCount=0, loading=false;

// tap count for surprise
function incBtn(){
  btnCount++;
  if(btnCount>=5 && Math.random()<0.25){
    btnCount=0;
    return true; // show surprise
  }
  return false;
}

// PARTICLES
(function(){
  const c=document.getElementById('ptc');
  const cols=['#7c5cbf','#c45c8a','#e8c96a','#5cb8bf'];
  for(let i=0;i<20;i++){
    const p=document.createElement('div');
    p.className='pt';
    const s=Math.random()*3+2;
    p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;background:${cols[~~(Math.random()*4)]};animation-duration:${Math.random()*10+8}s;animation-delay:${Math.random()*12}s;`;
    c.appendChild(p);
  }
})();

// RENDER CHARS
function renderChars(){
  const row=document.getElementById('charRow');
  row.innerHTML='';
  CHARS.forEach(c=>{
    const d=document.createElement('div');
    d.className='char-card'+(sel?.id===c.id?' active':'');
    d.innerHTML=`<img class="ce" src="${IMGS[c.id]||''}" alt="${c.name}" onerror="this.style.display='none'"><div class="cn">${c.name.split(' ').pop()}</div>`;
    d.onclick=()=>selectChar(c);
    row.appendChild(d);
  });
}

function selectChar(c){
  sel=c;
  renderChars();
  const se=document.getElementById('stageE');
  se.src=IMGS[c.id]||""; se.alt=c.name;
  se.style.filter=`drop-shadow(0 8px 24px ${c.color}88)`;
  document.getElementById('dlgWho').textContent=`${c.name}`;
  document.getElementById('dlgWho').style.color=c.color;
  document.getElementById('dlgTxt').textContent='버튼을 눌러봐! 💜';
  document.getElementById('dlgBox').className='dlg-box';
  sparkle(document.getElementById('stage'),c.color);
  btnCount=0;
}

// TABS
function setTab(t){
  curTab=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.tab-${t}`).classList.add('active');
  if(sel) showLine(t);
}

  const box=document.getElementById('dlgBox');
  const who=document.getElementById('dlgWho');
  const txt=document.getElementById('dlgTxt');
  const clsMap={hello:'c-hello',chat:'c-chat',funny:'c-funny',surprise:'c-surprise'};
  box.className='dlg-box '+clsMap[actualType];
  who.style.color=sel.color;

  // remove old badge
  const ob=box.querySelector('.dlg-badge');
  if(ob)ob.remove();

  txt.innerHTML='<div class="dots"><span></span><span></span><span></span></div>';

  // animate stage
  const stage=document.getElementById('stage');
  stage.className='stage anim-'+actualType;
  setTimeout(()=>{stage.className='stage';},3500);

  setTimeout(()=>{
    const pool=D[sel.id][actualType];
    const line=pool[~~(Math.random()*pool.length)];
    typeWrite(txt,line);

    const badge=document.createElement('div');
    const bdMap={hello:'👋 안녕',chat:'💬 잡담',funny:'😂 웃겨봐',surprise:'✨ 뜻밖의 말'};
    const bdCls={hello:'bd-hello',chat:'bd-chat',funny:'bd-funny',surprise:'bd-surprise'};
    badge.className='dlg-badge '+bdCls[actualType];
    badge.textContent=bdMap[actualType];
    setTimeout(()=>{box.appendChild(badge);},line.length*42+200);

    addHist(sel,line,actualType,bdCls[actualType],bdMap[actualType]);
    sparkle(stage,sel.color);
    loading=false;
  },600);
}

function typeWrite(el,text,speed=42){
  el.innerHTML='';
  [...text].forEach((ch,i)=>{
    const s=document.createElement('span');
    s.className='tc';
    if(ch===' '){s.innerHTML='&#32;';}else{s.textContent=ch;}
    s.style.animationDelay=`${i*speed}ms`;
    el.appendChild(s);
  });
}

function addHist(c,t,type,bdCls,bdLabel){
  hist.unshift({c,t,type,bdCls,bdLabel});
  if(hist.length>5)hist.pop();
  const list=document.getElementById('histList');
  list.innerHTML=hist.map(h=>`
    <div class="hist-item">
      <span class="hi-who" style="color:${h.c.color}">${h.c.emoji}</span>
      <span class="hi-bdg ${h.bdCls}">${h.bdLabel}</span>
      <span style="flex:1;font-size:10px;">${h.t}</span>
    </div>`).join('');
}

function sparkle(target,color){
  const r=target.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  const em=['✨','💫','⭐','🌟','💥'];
  for(let i=0;i<7;i++){
    const s=document.createElement('div');
    s.className='sparkle';
    s.textContent=em[~~(Math.random()*em.length)];
    s.style.cssText=`left:${cx}px;top:${cy}px;font-size:${Math.random()*12+10}px;--tx:${(Math.random()-.5)*110}px;--ty:${(Math.random()-.5)*110}px;`;
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),800);
  }
}

// 탭 버튼 클릭도 showLine 트리거
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{
  if(sel)setTimeout(()=>showLine(curTab),50);
}));

renderChars();
</script>
